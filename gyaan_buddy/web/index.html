    .app-loading__content {
      align-items: center;
      display: flex;
      flex-direction: column;
      gap: 14px;

    .app-loading__spinner {

      border: 3px solid rgba(0, 22, 122, 0.14);
      border-radius: 999px;
      border-top-color: #365dea;
      height: 34px;
      width: 34px;
    }

    .app-loading__label {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;

    @keyframes gyanbuddy-spin {
